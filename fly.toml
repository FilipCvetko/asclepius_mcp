app = "asclepius-mcp"
primary_region = "fra"

[build]

[env]
  PORT = "8000"
  MCP_TRANSPORT = "streamable-http"
  MCP_HOST = "0.0.0.0"
  CHROMADB_PATH = "/data/chromadb"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "120s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/health"

[[vm]]
  size = "shared-cpu-2x"
  memory = "4gb"

[mounts]
  source = "asclepius_data"
  destination = "/data"
